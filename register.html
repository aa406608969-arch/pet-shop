<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>创建账号 · 拾光宠物</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body class="auth-page"><main class="register-wrap"><a class="brand" href="index.html">拾光宠物<span>SEASON PETS</span></a><form id="registerForm" class="register-card"><p class="eyebrow">CREATE YOUR ACCOUNT</p><h1>创建邮箱账号</h1><p class="hint">注册后会向你的邮箱发送验证链接。</p><label>邮箱<input required type="email" name="email" placeholder="name@example.com"></label><label>设置密码<input required minlength="6" type="password" name="password" placeholder="至少 6 位"></label><label>确认密码<input required minlength="6" type="password" name="passwordConfirm" placeholder="再次输入密码"></label><button class="primary" type="submit">注册并发送验证邮件</button><p class="hint" id="registerStatus" aria-live="polite"></p><p class="hint auth-link">已有账号？<a href="index.html">返回登录</a></p></form></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="register.js"></script></body></html>
