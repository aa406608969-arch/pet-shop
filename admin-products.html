<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品管理 · 拾光宠物</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body><header><a class="brand" href="index.html">拾光宠物<span>SEASON PETS</span></a><div class="admin-nav"><a class="back-link" href="account.html">个人中心</a><a class="back-link" href="index.html">查看商城</a></div></header><main class="admin-page"><section class="admin-head"><div><p class="eyebrow">PRODUCT MANAGEMENT</p><h1>商品配置</h1><p class="hint">新增、编辑、上下架或删除商品，保存后前台会自动更新。</p></div><button class="primary" id="newProduct">＋ 新增商品</button></section><section class="admin-layout"><aside class="admin-form-wrap"><form id="productForm"><div class="panel-head"><h2 id="formTitle">新增商品</h2><button type="button" class="text-button hidden" id="cancelEdit">取消编辑</button></div><input type="hidden" name="id"><label>商品名称<input required name="name" maxlength="80" placeholder="如：云朵舒睡宠物窝"></label><label>商品分类<input required name="category" list="categoryList" placeholder="如：舒适睡眠"><datalist id="categoryList"><option>喂养用品</option><option>舒适睡眠</option><option>外出装备</option><option>玩具互动</option></datalist></label><div class="form-two"><label>价格（元）<input required min="0" step="0.01" type="number" name="price"></label><label>库存（件）<input required min="0" step="1" type="number" name="stock"></label></div><label>商品图片链接<input required type="url" name="image_url" placeholder="https://..."></label><div class="image-preview" id="imagePreview">图片预览</div><label>商品说明<textarea required name="description" maxlength="1000" placeholder="描述材质、尺寸、适用宠物、使用场景等"></textarea></label><label class="checkline"><input type="checkbox" name="is_active" checked> 在前台展示此商品</label><button class="primary" id="saveProduct">保存商品</button><p class="hint" id="formStatus" aria-live="polite"></p></form></aside><section class="admin-list-wrap"><div class="admin-list-tools"><h2>全部商品</h2><input id="productFilter" placeholder="搜索商品名称"></div><div id="adminProducts" class="admin-products"><p class="hint">正在加载商品…</p></div></section></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="admin-products.js"></script></body></html>
