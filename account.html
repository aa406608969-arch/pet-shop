<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>个人中心 · 拾光宠物</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"></head><body><header><a class="brand" href="index.html">拾光宠物<span>SEASON PETS</span></a><a class="back-link" href="index.html">← 返回商城</a></header><main class="account-page"><section class="account-hero"><div class="avatar" id="avatar">我</div><div><p class="eyebrow">MY ACCOUNT</p><h1 id="accountName">个人中心</h1><p class="hint" id="accountEmail"></p></div><div class="account-actions"><a class="outline-button hidden" id="adminEntry" href="admin-products.html">后台管理</a><button class="outline-button" id="signOut">退出登录</button></div></section><div class="account-grid"><section class="panel"><h2>个人信息</h2><form id="profileForm"><label>昵称<input name="full_name" placeholder="请输入昵称"></label><label>联系电话<input name="phone" placeholder="用于订单联系"></label><button class="primary">保存信息</button><p class="hint" id="profileStatus"></p></form></section><section class="panel"><div class="panel-head"><h2>收货地址</h2><button class="text-button" id="newAddress">新增地址</button></div><div id="addressList"></div><form class="address-form hidden" id="addressForm"><label>收件人<input required name="recipient"></label><label>手机号码<input required name="phone" pattern="1[3-9][0-9]{9}"></label><label>详细地址<textarea required name="detail"></textarea></label><label class="checkline"><input type="checkbox" name="is_default"> 设为默认地址</label><button class="primary">保存地址</button></form></section></div><section class="panel orders-panel"><h2>我的订单</h2><div id="orderList"><p class="hint">正在加载订单…</p></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="account.js"></script></body></html>
